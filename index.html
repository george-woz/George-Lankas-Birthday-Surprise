<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Gift for George</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f5ede0;
    --parchment-dark: #e8d9c4;
    --parchment-shadow: #c9b89a;
    --ink: #2c1f12;
    --ink-faded: #5c4a35;
    --wax: #8b1a1a;
    --gold: #b8973a;
    --envelope-back: #d4c4a8;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a120a;
    font-family: 'Cormorant Garamond', serif;
  }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 70%, #3a2010 0%, #1a0e06 50%, #0d0704 100%);
    z-index: 0;
  }

  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 40% 30% at 50% 100%, rgba(180,90,20,0.15) 0%, transparent 70%);
    animation: flicker 4s ease-in-out infinite alternate;
  }

  @keyframes flicker {
    0%   { opacity: 0.8; transform: scale(1); }
    33%  { opacity: 1;   transform: scale(1.02); }
    66%  { opacity: 0.85; transform: scale(0.99); }
    100% { opacity: 0.9;  transform: scale(1.01); }
  }

  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .scene {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    perspective: 1200px;
  }

  .from-label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: rgba(200,175,140,0.5);
    font-size: clamp(0.72rem, 1.4vw, 0.88rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 2.2rem;
    opacity: 0;
    animation: fadeUp 1.5s ease 0.5s forwards;
  }

  .envelope-wrapper {
    position: relative;
    width: clamp(300px, 54vw, 620px);
    opacity: 0;
    animation: fadeUp 1.8s ease 0.9s forwards;
    cursor: pointer;
  }

  .envelope-wrapper:hover .envelope { transform: translateY(-7px); }
  .envelope-wrapper:hover .wax-seal { transform: translateX(-50%) scale(1.05); }

  .envelope {
    position: relative;
    width: 100%;
    padding-bottom: 62%;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    filter: drop-shadow(0 28px 55px rgba(0,0,0,0.85)) drop-shadow(0 8px 18px rgba(0,0,0,0.5));
  }

  .env-body {
    position: absolute; inset: 0;
    background: var(--parchment);
    border-radius: 3px;
    overflow: hidden;
  }

  .env-body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.016) 28px, rgba(0,0,0,0.016) 29px);
  }

  .env-body::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 30% 20% at 15% 85%, rgba(150,100,50,0.11) 0%, transparent 70%),
      radial-gradient(ellipse 20% 15% at 85% 10%, rgba(130,90,40,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 22% 16% at 65% 72%, rgba(140,95,45,0.07) 0%, transparent 70%);
  }

  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0; height: 54%;
    overflow: hidden; z-index: 2;
  }

  .env-flap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 200%;
    clip-path: polygon(0 0, 100% 0, 50% 52%);
    background: linear-gradient(160deg, #ddd0b8 0%, #c9b89a 50%, #baa882 100%);
    border-bottom: 1px solid rgba(0,0,0,0.07);
  }

  .env-bottom-left {
    position: absolute;
    bottom: 0; left: 0;
    width: 51%; height: 55%;
    background: linear-gradient(135deg, #ece0cc 0%, #d4c4a8 100%);
    clip-path: polygon(0 100%, 100% 100%, 0 0);
    z-index: 1;
  }

  .env-bottom-right {
    position: absolute;
    bottom: 0; right: 0;
    width: 51%; height: 55%;
    background: linear-gradient(225deg, #ece0cc 0%, #d4c4a8 100%);
    clip-path: polygon(100% 100%, 0 100%, 100% 0);
    z-index: 1;
  }

  .env-border {
    position: absolute; inset: 10px;
    border: 1px solid rgba(184,151,58,0.22);
    border-radius: 2px;
    z-index: 3; pointer-events: none;
  }

  .env-border::before {
    content: '';
    position: absolute; inset: 4px;
    border: 0.5px solid rgba(184,151,58,0.1);
    border-radius: 1px;
  }

  .env-corner {
    position: absolute;
    width: 22px; height: 22px;
    z-index: 4; opacity: 0.38;
  }
  .env-corner svg { width: 100%; height: 100%; }
  .env-corner.tl { top: 14px; left: 14px; }
  .env-corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
  .env-corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
  .env-corner.br { bottom: 14px; right: 14px; transform: scale(-1); }

  .env-address {
    position: absolute;
    bottom: 22%; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5; pointer-events: none;
    width: 70%;
  }

  .env-address .to-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.6vw, 1.55rem);
    color: var(--ink);
    font-weight: 400;
    letter-spacing: 0.05em;
    line-height: 1.2;
    white-space: nowrap;
  }

  .env-address .to-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(0.62rem, 1.2vw, 0.78rem);
    color: var(--ink-faded);
    letter-spacing: 0.12em;
    margin-top: 5px;
    opacity: 0.68;
  }

  .postmark {
    position: absolute;
    top: 16%; right: 11%;
    width: clamp(50px, 7.5vw, 70px);
    height: clamp(50px, 7.5vw, 70px);
    z-index: 5; opacity: 0.2;
  }

  /* WAX SEAL */
  .wax-seal {
    position: absolute;
    bottom: -15%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    cursor: pointer;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.65)) drop-shadow(0 3px 8px rgba(120,20,20,0.45));
  }

  .wax-seal svg {
    width: clamp(88px, 13.5vw, 126px);
    height: clamp(88px, 13.5vw, 126px);
    overflow: visible;
  }

  .click-hint {
    margin-top: 5.5rem;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.5s ease 2.4s forwards;
  }

  .click-hint p {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: rgba(200,175,140,0.42);
    font-size: clamp(0.72rem, 1.3vw, 0.86rem);
    letter-spacing: 0.22em;
  }

  .pulse-dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: rgba(200,175,140,0.4);
    border-radius: 50%;
    margin: 0 7px;
    vertical-align: middle;
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50% { opacity: 0.75; transform: scale(1.45); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .envelope-wrapper.opening .envelope {
    animation: envelopeOpen 1.4s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  @keyframes envelopeOpen {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    25%  { transform: translateY(-18px) scale(1.02); }
    65%  { transform: translateY(-8px) scale(0.97); opacity: 1; }
    100% { transform: translateY(90px) scale(0.82); opacity: 0; }
  }

  .envelope-wrapper.opening .wax-seal {
    animation: sealBreak 0.55s ease 0.12s forwards;
  }

  @keyframes sealBreak {
    0%   { transform: translateX(-50%) scale(1) rotate(0deg); }
    35%  { transform: translateX(-50%) scale(1.18) rotate(-4deg); }
    100% { transform: translateX(-50%) scale(0.05) rotate(18deg); opacity: 0; }
  }

  .flash {
    position: fixed; inset: 0; z-index: 999;
    background: #fff8f0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.85s ease;
  }

  .flash.active { opacity: 1; pointer-events: all; }

  .particles {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    overflow: hidden;
  }

  .spark {
    position: absolute;
    border-radius: 50%;
    animation: sparkFloat linear infinite;
  }

  @keyframes sparkFloat {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    8%   { opacity: 0.7; }
    85%  { opacity: 0.25; }
    100% { transform: translateY(-110px) translateX(var(--dx,12px)) scale(0.2); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>
<div class="particles" id="particles"></div>

<div class="scene">

  <div class="from-label">A Gift From Your Family &nbsp;·&nbsp; April 1, 2026</div>

  <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">

    <div class="envelope">
      <div class="env-body">

        <div class="env-flap"></div>
        <div class="env-bottom-left"></div>
        <div class="env-bottom-right"></div>
        <div class="env-border"></div>

        <!-- Corner flourishes -->
        <div class="env-corner tl">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8b6914" stroke-width="1.2">
            <path d="M3 3 L11 3 M3 3 L3 11"/>
            <path d="M3 3 L7 7" stroke-width="0.8"/>
            <circle cx="3" cy="3" r="1.8" fill="#b8973a" stroke="none" opacity="0.8"/>
          </svg>
        </div>
        <div class="env-corner tr">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8b6914" stroke-width="1.2">
            <path d="M3 3 L11 3 M3 3 L3 11"/>
            <path d="M3 3 L7 7" stroke-width="0.8"/>
            <circle cx="3" cy="3" r="1.8" fill="#b8973a" stroke="none" opacity="0.8"/>
          </svg>
        </div>
        <div class="env-corner bl">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8b6914" stroke-width="1.2">
            <path d="M3 3 L11 3 M3 3 L3 11"/>
            <path d="M3 3 L7 7" stroke-width="0.8"/>
            <circle cx="3" cy="3" r="1.8" fill="#b8973a" stroke="none" opacity="0.8"/>
          </svg>
        </div>
        <div class="env-corner br">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8b6914" stroke-width="1.2">
            <path d="M3 3 L11 3 M3 3 L3 11"/>
            <path d="M3 3 L7 7" stroke-width="0.8"/>
            <circle cx="3" cy="3" r="1.8" fill="#b8973a" stroke="none" opacity="0.8"/>
          </svg>
        </div>

        <!-- Postmark -->
        <div class="postmark">
          <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="35" cy="35" r="31" stroke="#2c1f12" stroke-width="1.8"/>
            <circle cx="35" cy="35" r="26" stroke="#2c1f12" stroke-width="0.8"/>
            <text x="35" y="30" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-size="6.5" fill="#2c1f12" letter-spacing="1.5">NEW JERSEY</text>
            <line x1="13" y1="35" x2="57" y2="35" stroke="#2c1f12" stroke-width="1.4"/>
            <text x="35" y="47" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-size="7" fill="#2c1f12" letter-spacing="1">APR 1 · 2026</text>
          </svg>
        </div>

        <!-- Address -->
        <div class="env-address">
          <div class="to-name">George R. Lankas, Jr.</div>
          <div class="to-subtitle">on the occasion of his 77th year</div>
        </div>

      </div>
    </div>

    <!-- WAX SEAL -->
    <div class="wax-seal">
      <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="wg" cx="40%" cy="36%" r="62%">
            <stop offset="0%"   stop-color="#d64444"/>
            <stop offset="30%"  stop-color="#a81c1c"/>
            <stop offset="65%"  stop-color="#7c1010"/>
            <stop offset="100%" stop-color="#560a0a"/>
          </radialGradient>
          <radialGradient id="ws" cx="34%" cy="30%" r="32%">
            <stop offset="0%"   stop-color="rgba(255,170,140,0.38)"/>
            <stop offset="100%" stop-color="rgba(255,150,120,0)"/>
          </radialGradient>
          <filter id="em">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b"/>
            <feOffset dx="0.6" dy="1.0" in="b" result="ob"/>
            <feComposite in="SourceGraphic" in2="ob" operator="over"/>
          </filter>
        </defs>

        <!-- Wax blob — organic irregular shape -->
        <path d="
          M64,7
          C76,7 90,13 99,22
          C109,32 117,44 118,57
          C120,70 114,83 106,91
          C97,101 84,108 71,111
          C61,113 50,112 41,107
          C30,101 21,91 16,79
          C10,66 10,51 16,39
          C22,27 34,16 48,11
          C53,9 58,7 64,7 Z
        " fill="url(#wg)"/>

        <!-- Shine -->
        <path d="
          M64,7
          C76,7 90,13 99,22
          C109,32 117,44 118,57
          C120,70 114,83 106,91
          C97,101 84,108 71,111
          C61,113 50,112 41,107
          C30,101 21,91 16,79
          C10,66 10,51 16,39
          C22,27 34,16 48,11
          C53,9 58,7 64,7 Z
        " fill="url(#ws)"/>

        <!-- Engraved rings -->
        <circle cx="64" cy="59" r="43" fill="none" stroke="rgba(255,195,175,0.16)" stroke-width="1.4"/>
        <circle cx="64" cy="59" r="38" fill="none" stroke="rgba(255,195,175,0.11)" stroke-width="0.7"/>
        <!-- Dotted inner ring -->
        <circle cx="64" cy="59" r="34" fill="none" stroke="rgba(255,195,175,0.18)" stroke-width="0.9" stroke-dasharray="2.2 3.2"/>

        <!-- GRL — the three initials, evenly spaced -->
        <text x="35" y="62"
          font-family="'Cormorant Garamond', serif"
          font-size="20" font-weight="500"
          fill="rgba(255,218,198,0.93)"
          text-anchor="middle"
          filter="url(#em)">G</text>

        <text x="64" y="62"
          font-family="'Cormorant Garamond', serif"
          font-size="20" font-weight="500"
          fill="rgba(255,218,198,0.93)"
          text-anchor="middle"
          filter="url(#em)">R</text>

        <text x="93" y="62"
          font-family="'Cormorant Garamond', serif"
          font-size="20" font-weight="500"
          fill="rgba(255,218,198,0.93)"
          text-anchor="middle"
          filter="url(#em)">L</text>

        <!-- Thin rule under initials -->
        <line x1="41" y1="68" x2="87" y2="68" stroke="rgba(255,195,170,0.3)" stroke-width="0.7"/>

        <!-- 77 centered below -->
        <text x="64" y="83"
          font-family="'Cormorant Garamond', serif"
          font-size="13" font-weight="300"
          fill="rgba(255,210,185,0.72)"
          text-anchor="middle"
          filter="url(#em)"
          letter-spacing="3.5">77</text>

        <!-- Small diamond accents at 9 and 3 o'clock -->
        <path d="M25 59 L28 56 L31 59 L28 62 Z" fill="rgba(255,195,170,0.28)"/>
        <path d="M97 59 L100 56 L103 59 L100 62 Z" fill="rgba(255,195,170,0.28)"/>

        <!-- Top small ornament -->
        <circle cx="64" cy="22" r="1.8" fill="rgba(255,195,170,0.3)"/>
        <path d="M60 22 Q64 17 68 22" fill="none" stroke="rgba(255,195,170,0.25)" stroke-width="0.9"/>
      </svg>
    </div>

  </div><!-- envelope-wrapper -->

  <div class="click-hint">
    <p><span class="pulse-dot"></span> tap to open your gift <span class="pulse-dot"></span></p>
  </div>

</div>

<div class="flash" id="flash"></div>

<script>
  // Floating sparks / candlelight particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const sz = Math.random() * 2.5 + 1;
    s.style.cssText = `
      left:${18 + Math.random()*64}%;
      bottom:${Math.random()*28}%;
      width:${sz}px; height:${sz}px;
      --dx:${(Math.random()-0.5)*38}px;
      animation-duration:${3.5 + Math.random()*5}s;
      animation-delay:${Math.random()*6}s;
      opacity:0;
      background:${Math.random()>0.5 ? 'rgba(255,200,80,0.65)' : 'rgba(255,155,45,0.5)'};
    `;
    pc.appendChild(s);
  }

  function openEnvelope() {
    const w = document.getElementById('envelope');
    if (w.classList.contains('opening')) return;
    w.classList.add('opening');

    setTimeout(() => {
      const f = document.getElementById('flash');
      f.classList.add('active');
      setTimeout(() => {
        // Change this filename to match your film HTML file
        window.location.href = 'film.html';
      }, 950);
    }, 1250);
  }
</script>
</body>
</html>
